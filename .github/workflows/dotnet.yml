# This workflow will build a .NET project and a Docker image
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal
      - name: Build Docker image
        run: docker build -t evilbunny .
      - name: Check dotnet executable
        run: docker run --rm evilbunny sh -c 'echo $PATH && ls -l $(echo $PATH | tr ":" "\n")'
      - name: Test Docker image
        run: docker run --rm evilbunny dotnet test --verbosity normal
